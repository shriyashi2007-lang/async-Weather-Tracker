<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Async Weather App</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: pink;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:rgb(80, 3, 51);
    text-decoration: double;
    font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

.main{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.left-container, .right-container{
    background:white;
    padding:20px;
    border-radius:10px;
    width:50%;
}

button{
    background:#e80a21;
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#9b1607;
}

input{
    padding:8px;
    width:70%;
    border-radius:5px;
    border:1px solid rgb(99, 2, 86);
}

#Search-history button{
    margin:5px;
}

.card{
    background:#f2f2f2;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

</style>

</head>

<body>
    <h1> Async Weather Tracker</h1>
    
    <div class="main">
        <div class="left-container">
            <h3>Search City</h3>
            <form>
                <input placeholder="Delhi, London" type="text" id="city">
                <button type="submit">Search</button>
            </form>
            
            <h3>Search History</h3>
            <div id="Search-history"></div>
        </div>
        <div class="right-container">
            <h3>Weather Info</h3>
            <div id="weather-data"></div>
        </div>
    </div>
    <script>
    let API_KEY = "1a761d3bb408836cd1af3641ce1604c9";
    let form = document.querySelector("form");
    let cityInput = document.getElementById("city");
    let weatherDiv = document.getElementById("weather-data");
    let historyDiv = document.getElementById("Search-history");

    let history = [];
    async function fetchWeather(city){
        try{
            let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);

            if(!response.ok){
            throw new Error("City not found");
            }

            let data = await response.json();

            displayWeather(data);

            addToHistory(city,data);

        }
        catch(error){
            
            weatherDiv.innerHTML = `<p style="color:red;">${error.message}</p>`;

        }
    }
 
    function displayWeather(data){
        let card = document.createElement("div");
        card.className="card";
        card.innerHTML = `
        <h4>City: ${data.name}</h4>
        <h4>Temperature: ${data.main.temp} °C</h4>
        <h4>Humidity: ${data.main.humidity}%</h4>
        <h4>Wind Speed: ${data.wind.speed} m/s</h4>
    `;
        weatherDiv.innerHTML="";

        weatherDiv.appendChild(card);

    }


    function addToHistory(city,data){
        
        if(history.some(item => item.city === city.toLowerCase())){
        return;
       }

        history.push({
            city: city.toLowerCase(),
            data:data
       });
       
       renderHistory();

    }


    function renderHistory(){
        historyDiv.innerHTML="";
        
        history.forEach(item => {
            
            let btn=document.createElement("button");

            btn.textContent=item.city;

            btn.onclick=()=>{
                
                displayWeather(item.data);

            };

            historyDiv.appendChild(btn);
        
        });

    }
    
    form.addEventListener("submit",(e)=>{
        
        e.preventDefault();
        
        let city=cityInput.value.trim();
        
        if(city){
            
            fetchWeather(city);
            
            cityInput.value="";

        }

    });

    </script>

</body>

</html>
